<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart — Miu Miu</title>
    <link rel="stylesheet" href="Style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="brand">✦ Miu Miu</div>
        <ul class="menu">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="My_Glasses.html" class="nav-link">Products</a></li>
            <li><a href="Cart.html" class="nav-link cart-icon active">🛒 <span class="cart-count" id="cartCount">0</span></a></li>
        </ul>
    </nav>

    <section class="cart-page">
        <div class="page-header">
            <p class="section-tag">✦ Your Selections</p>
            <h2>Shopping Cart</h2>
        </div>

        <div class="cart-layout">
            <div class="cart-items" id="cartItems">
                <!-- Rendered by JS -->
            </div>

            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row"><span>Subtotal</span><span id="subtotal">Rp0</span></div>
                <div class="summary-row"><span>Shipping</span><span>Free ✦</span></div>
                <div class="summary-divider"></div>
                <div class="summary-row total"><span>Total</span><span id="total">Rp0</span></div>
                <a href="Checkout.html" class="btn-primary full" id="checkoutBtn">Checkout →</a>
                <a href="My_Glasses.html" class="btn-ghost full" style="margin-top:10px">Continue Shopping</a>
            </div>
        </div>

        <div class="cart-empty" id="cartEmpty" style="display:none">
            <p>🌸 Your cart is empty</p>
            <a href="My_Glasses.html" class="btn-primary">Start Shopping</a>
        </div>
    </section>

    <footer class="footer"><p>✦ Fashion Miu Miu &copy; 2026 — Unapologetically You</p></footer>

    <script>
        function formatIDR(n) { return 'Rp' + n.toLocaleString('id-ID'); }

        function renderCart() {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const container = document.getElementById('cartItems');
            const empty = document.getElementById('cartEmpty');
            const layout = document.querySelector('.cart-layout');
            document.getElementById('cartCount').textContent = cart.length;

            if (cart.length === 0) {
                layout.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            let total = 0;
            container.innerHTML = cart.map((item, i) => {
                total += item.price;
                return `
                <div class="cart-item">
                    <img src="${item.img}" alt="${item.name}">
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p class="price">${formatIDR(item.price)}</p>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${i})">✕</button>
                </div>`;
            }).join('');

            document.getElementById('subtotal').textContent = formatIDR(total);
            document.getElementById('total').textContent = formatIDR(total);
        }

        function removeItem(i) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.splice(i, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        renderCart();
    </script>
</body>
</html>
