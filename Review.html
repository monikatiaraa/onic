<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews — Miu Miu</title>
    <link rel="stylesheet" href="Style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="brand">✦ Miu Miu</div>
        <ul class="menu">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="My_Glasses.html" class="nav-link">Products</a></li>
            <li><a href="About.html" class="nav-link">About</a></li>
            <li><a href="Review.html" class="nav-link">Reviews</a></li>
            <li><a href="Cart.html" class="nav-link cart-icon">🛒 <span class="cart-count" id="cartCount">0</span></a></li>        </ul>
    </nav>

    <section class="review-page">
        <div class="page-header">
            <p class="section-tag">✦ Customer Voice</p>
            <h2>Reviews</h2>
        </div>

        <!-- Stats Bar -->
        <div class="review-stats">
            <div class="stat-box">
                <span class="stat-num" id="totalCount">0</span>
                <span class="stat-label">Total Reviews</span>
            </div>
            <div class="stat-box positive">
                <span class="stat-num" id="goodCount">0</span>
                <span class="stat-label">😊 Positive</span>
            </div>
            <div class="stat-box negative">
                <span class="stat-num" id="badCount">0</span>
                <span class="stat-label">😞 Needs Improvement</span>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="review-tabs">
            <button class="tab-btn active" onclick="filterReviews('all', this)">All</button>
            <button class="tab-btn" onclick="filterReviews('positive', this)">😊 Positive</button>
            <button class="tab-btn" onclick="filterReviews('negative', this)">😞 Negative</button>
        </div>

        <!-- Review Cards -->
        <div class="review-grid" id="reviewList"></div>

        <!-- Write Review Form -->
        <div class="review-form-wrap">
            <h3>✦ Write a Review</h3>
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="rName" placeholder="e.g. Sarah">
            </div>
            <div class="form-group">
                <label>Product</label>
                <input type="text" id="rProduct" placeholder="e.g. Oval Frame Rosé">
            </div>

            <!-- Star Rating -->
            <div class="form-group">
                <label>Rating</label>
                <div class="star-picker" id="starPicker">
                    <span onclick="setStar(1)">★</span>
                    <span onclick="setStar(2)">★</span>
                    <span onclick="setStar(3)">★</span>
                    <span onclick="setStar(4)">★</span>
                    <span onclick="setStar(5)">★</span>
                </div>
            </div>

            <!-- Sentiment Toggle -->
            <div class="form-group">
                <label>Experience</label>
                <div class="sentiment-toggle">
                    <button class="sent-btn active" id="sentGood" onclick="setSentiment('positive', this)">😊 Positive</button>
                    <button class="sent-btn" id="sentBad" onclick="setSentiment('negative', this)">😞 Negative</button>
                </div>
            </div>

            <div class="form-group">
                <label>Comment</label>
                <textarea id="rComment" rows="4" placeholder="Share your experience..."></textarea>
            </div>

            <button class="btn-primary" onclick="submitReview()">Submit Review ✦</button>
        </div>
    </section>

    <div class="toast" id="toast">✦ Review submitted!</div>
    <footer class="footer"><p>✦ Fashion Miu Miu &copy; 2026 — Unapologetically You</p></footer>

    <script>
        let selectedStar = 5;
        let selectedSentiment = 'positive';
        let currentFilter = 'all';

        document.getElementById('cartCount').textContent = JSON.parse(localStorage.getItem('cart') || '[]').length;

        function setStar(n) {
            selectedStar = n;
            document.querySelectorAll('#starPicker span').forEach((s, i) => {
                s.classList.toggle('active', i < n);
            });
        }
        setStar(5);

        function setSentiment(type, btn) {
            selectedSentiment = type;
            document.querySelectorAll('.sent-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function getReviews() {
            return JSON.parse(localStorage.getItem('miumiu_reviews') || '[]');
        }

        function saveReviews(reviews) {
            localStorage.setItem('miumiu_reviews', JSON.stringify(reviews));
        }

        function renderReviews(filter) {
            let reviews = getReviews();
            const list = document.getElementById('reviewList');
            const filtered = filter === 'all' ? reviews : reviews.filter(r => r.sentiment === filter);

            document.getElementById('totalCount').textContent = reviews.length;
            document.getElementById('goodCount').textContent = reviews.filter(r => r.sentiment === 'positive').length;
            document.getElementById('badCount').textContent = reviews.filter(r => r.sentiment === 'negative').length;

            if (filtered.length === 0) {
                list.innerHTML = '<p class="no-reviews">No reviews yet. Be the first! 🌸</p>';
                return;
            }

            list.innerHTML = filtered.map((r, i) => {
                const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
                const badge = r.sentiment === 'positive'
                    ? '<span class="sent-badge positive">😊 Positive</span>'
                    : '<span class="sent-badge negative">😞 Negative</span>';
                return `
                <div class="review-card ${r.sentiment}">
                    <div class="review-top">
                        <div>
                            <strong>${r.name}</strong>
                            <small>${r.product}</small>
                        </div>
                        ${badge}
                    </div>
                    <div class="stars-display">${stars}</div>
                    <p>${r.comment}</p>
                    <div class="review-footer">
                        <small>${r.date}</small>
                        <button class="del-btn" onclick="deleteReview(${reviews.indexOf(r)})">✕</button>
                    </div>
                </div>`;
            }).join('');
        }

        function filterReviews(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderReviews(type);
        }

        function deleteReview(i) {
            let reviews = getReviews();
            reviews.splice(i, 1);
            saveReviews(reviews);
            renderReviews(currentFilter);
        }

        function submitReview() {
            const name = document.getElementById('rName').value.trim();
            const product = document.getElementById('rProduct').value.trim();
            const comment = document.getElementById('rComment').value.trim();
            if (!name || !comment) { alert('Please fill in your name and comment.'); return; }

            const reviews = getReviews();
            reviews.unshift({
                name, product: product || 'Miu Miu Product',
                rating: selectedStar,
                sentiment: selectedSentiment,
                comment,
                date: new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })
            });
            saveReviews(reviews);

            // Reset
            document.getElementById('rName').value = '';
            document.getElementById('rProduct').value = '';
            document.getElementById('rComment').value = '';
            setStar(5);
            setSentiment('positive', document.getElementById('sentGood'));

            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
            renderReviews(currentFilter);
        }

        renderReviews('all');
    </script>
</body>
</html>
